<!-- @dsCard group="Colors" viewport="700x180" name="Jet Skins" subtitle="Hangar loadout accents" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--af-bg); font-family: var(--af-font-ui);
         padding: 24px; color: var(--af-text); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 150px; border-radius: var(--af-radius-md); overflow: hidden;
        border: var(--af-stroke) solid var(--af-border); display:flex; align-items:center;
        gap:12px; padding:12px; background: var(--af-surface); }
  .dot { width: 34px; height: 34px; border-radius: 999px; flex:0 0 auto; }
  .name { font-size: 11px; letter-spacing: var(--af-track-wide); text-transform: uppercase; font-weight: 700; }
  .hex { font-family: var(--af-font-mono); font-size: 10px; color: var(--af-text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="dot" style="background:#0088ff;box-shadow:0 0 12px #0088ff"></div><div><div class="name" style="color:#0088ff">Cobalt Alpha</div><div class="hex">#0088FF · balanced</div></div></div>
    <div class="sw"><div class="dot" style="background:#ff2244;box-shadow:0 0 12px #ff2244"></div><div><div class="name" style="color:#ff2244">Crimson Phoenix</div><div class="hex">#FF2244 · speed</div></div></div>
    <div class="sw"><div class="dot" style="background:#ffbb00;box-shadow:0 0 12px #ffbb00"></div><div><div class="name" style="color:#ffbb00">Solar Eagle</div><div class="hex">#FFBB00 · armor</div></div></div>
    <div class="sw"><div class="dot" style="background:#00ee55;box-shadow:0 0 12px #00ee55"></div><div><div class="name" style="color:#00ee55">Emerald Viper</div><div class="hex">#00EE55 · firepower</div></div></div>
  </div>
</body>
</html>

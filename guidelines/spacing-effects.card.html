<!-- @dsCard group="Spacing" viewport="700x210" name="Glow & Glass" subtitle="Colored outer glow over gray elevation · frosted modals" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--af-font-ui); padding: 26px; color: var(--af-text);
         background: linear-gradient(135deg,#1d3a55,#0a1828); }
  .row { display: flex; gap: 22px; flex-wrap: wrap; align-items: center; }
  .item { text-align: center; }
  .box { width: 96px; height: 64px; border-radius: var(--af-radius-md);
         display:flex; align-items:center; justify-content:center;
         font-size:10px; letter-spacing:1px; text-transform:uppercase; font-weight:700; }
  .glass { background: var(--af-glass-fill); backdrop-filter: var(--af-blur-glass);
           -webkit-backdrop-filter: var(--af-blur-glass);
           border: var(--af-stroke) solid rgba(0,170,255,0.35); color: var(--af-cyan); }
  .n { font-family: var(--af-font-mono); font-size: 9px; color: var(--af-text-muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="background:var(--af-grad-action);box-shadow:var(--af-glow-orange);color:#000a14">CTA</div><div class="n">glow-orange</div></div>
    <div class="item"><div class="box" style="background:var(--af-surface);box-shadow:var(--af-glow-cyan);color:var(--af-cyan)">ACTIVE</div><div class="n">glow-cyan</div></div>
    <div class="item"><div class="box" style="background:var(--af-surface);box-shadow:var(--af-glow-danger);border:1.5px solid rgba(255,51,51,.4);color:var(--af-danger)">ALERT</div><div class="n">glow-danger</div></div>
    <div class="item"><div class="box glass">GLASS</div><div class="n">blur(14px)</div></div>
  </div>
</body>
</html>

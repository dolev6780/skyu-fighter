<!-- @dsCard group="Brand" viewport="700x210" name="Power-Up System" subtitle="The 8 pickup badges from the real sprite strip" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--af-font-ui); color: var(--af-text); background: var(--af-bg); padding: 24px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .pu { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 74px; }
  .ring { width: 56px; height: 56px; border-radius: 999px; display: flex; align-items: center; justify-content: center; }
  .ring span { width: 74%; height: 74%; background-image: url(../assets/sprites/powerups_strip_128.png);
               background-size: 800% 100%; background-repeat: no-repeat; }
  .lab { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--af-text-muted); text-align: center; line-height: 1.2; }
</style>
</head>
<body>
  <div class="row" id="row"></div>
  <script>
    const PU = [
      ['WEAPON UP', '#FF8800'], ['RAPID FIRE', '#FFFF33'], ['MISSILES', '#FF3333'], ['REPAIR', '#33FF33'],
      ['EXTRA LIFE', '#FFFFFF'], ['ARMOR', '#3388FF'], ['TACTICAL NUKE', '#CC33FF'], ['SCORE STAR', '#FFD700'],
    ];
    const hexA = (c, a) => { const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; };
    document.getElementById('row').innerHTML = PU.map(([label, c], i) => `
      <div class="pu">
        <div class="ring" style="background:radial-gradient(circle,${hexA(c,0.28)} 0%,transparent 70%);border:1.5px solid ${hexA(c,0.6)};box-shadow:0 0 14px ${hexA(c,0.5)}">
          <span style="background-position:${(i/7)*100}% 0"></span>
        </div>
        <div class="lab">${label}</div>
      </div>`).join('');
  </script>
</body>
</html>

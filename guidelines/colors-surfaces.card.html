<!-- @dsCard group="Colors" viewport="700x180" name="Surfaces & Chrome" subtitle="Deep-navy cockpit surfaces, borders & dividers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--af-void); font-family: var(--af-font-ui);
         padding: 24px; color: var(--af-text); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 150px; border-radius: var(--af-radius-md); overflow: hidden;
        border: var(--af-stroke) solid var(--af-border); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--af-surface); }
  .name { font-size: 11px; letter-spacing: var(--af-track-wide); text-transform: uppercase;
          color: var(--af-cyan-mid); font-weight: 600; }
  .hex { font-family: var(--af-font-mono); font-size: 11px; color: var(--af-text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#001133"></div><div class="meta"><div class="name">App BG</div><div class="hex">#001133</div></div></div>
    <div class="sw"><div class="chip" style="background:#051020"></div><div class="meta"><div class="name">Surface</div><div class="hex">#051020</div></div></div>
    <div class="sw"><div class="chip" style="background:#07182e"></div><div class="meta"><div class="name">Raised</div><div class="hex">#07182E</div></div></div>
    <div class="sw"><div class="chip" style="background:#102540"></div><div class="meta"><div class="name">Border</div><div class="hex">#102540</div></div></div>
    <div class="sw"><div class="chip" style="background:#002244"></div><div class="meta"><div class="name">Divider</div><div class="hex">#002244</div></div></div>
  </div>
</body>
</html>

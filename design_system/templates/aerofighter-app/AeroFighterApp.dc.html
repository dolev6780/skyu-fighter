<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    const tryMount = () => {
      const el = document.getElementById('af-root');
      const NS = window.AeroFighterDesignSystem_9520d9;
      if (el && window.App && window.React && window.ReactDOM && NS) {
        if (this._mounted) return;
        this._mounted = true;
        window.ReactDOM.createRoot(el).render(window.React.createElement(window.App));
        const fit = () => {
          const s = Math.min((window.innerWidth - 16) / 393, (window.innerHeight - 16) / 852);
          el.style.transform = 'scale(' + Math.max(0.2, s) + ')';
        };
        window.addEventListener('resize', fit);
        this._fit = fit;
        setTimeout(fit, 0);
      } else {
        this._t = setTimeout(tryMount, 80);

    };
    tryMount();
  }
  componentWillUnmount() { if (this._t) clearTimeout(this._t); }
}

<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="Mobile-touch rhythm — 4 → 48px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--af-bg); font-family: var(--af-font-ui);
         padding: 26px; color: var(--af-text); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { text-align: center; }
  .bar { background: var(--af-cyan); border-radius: 3px; box-shadow: var(--af-glow-cyan-soft); }
  .n { font-family: var(--af-font-mono); font-size: 10px; color: var(--af-text-muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;height:4px"></div><div class="n">4</div></div>
    <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="n">8</div></div>
    <div class="item"><div class="bar" style="width:12px;height:12px"></div><div class="n">12</div></div>
    <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="n">16</div></div>
    <div class="item"><div class="bar" style="width:20px;height:20px"></div><div class="n">20</div></div>
    <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="n">24</div></div>
    <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="n">32</div></div>
    <div class="item"><div class="bar" style="width:48px;height:48px"></div><div class="n">48</div></div>
  </div>
</body>
</html>

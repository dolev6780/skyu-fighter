<!-- @dsCard group="Colors" viewport="700x180" name="Semantic" subtitle="Danger, success, warning, special" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--af-bg); font-family: var(--af-font-ui);
         padding: 24px; color: var(--af-text); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 124px; border-radius: var(--af-radius-md); overflow: hidden;
        border: var(--af-stroke) solid var(--af-border); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--af-surface); }
  .name { font-size: 11px; letter-spacing: var(--af-track-wide); text-transform: uppercase;
          color: var(--af-cyan-mid); font-weight: 600; }
  .hex { font-family: var(--af-font-mono); font-size: 11px; color: var(--af-text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#ff3333"></div><div class="meta"><div class="name">Danger</div><div class="hex">#FF3333</div></div></div>
    <div class="sw"><div class="chip" style="background:#ff2244"></div><div class="meta"><div class="name">Alert</div><div class="hex">#FF2244</div></div></div>
    <div class="sw"><div class="chip" style="background:#00ee55"></div><div class="meta"><div class="name">Success</div><div class="hex">#00EE55</div></div></div>
    <div class="sw"><div class="chip" style="background:#ffd700"></div><div class="meta"><div class="name">Gold</div><div class="hex">#FFD700</div></div></div>
    <div class="sw"><div class="chip" style="background:#cc33ff"></div><div class="meta"><div class="name">Nuke</div><div class="hex">#CC33FF</div></div></div>
  </div>
</body>
</html>

<!-- @dsCard group="Colors" viewport="700x180" name="Campaign Worlds" subtitle="Per-sector accent — recolors modals & progress" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--af-bg); font-family: var(--af-font-ui);
         padding: 24px; color: var(--af-text); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 150px; border-radius: var(--af-radius-md); overflow: hidden;
        border: var(--af-stroke) solid var(--af-border); }
  .chip { height: 60px; display:flex; align-items:flex-end; padding:8px; }
  .wn { font-size: 10px; font-weight:700; letter-spacing: var(--af-track-wide); color:#000a14; }
  .meta { padding: 8px 10px; background: var(--af-surface); }
  .name { font-size: 11px; letter-spacing: var(--af-track-wide); text-transform: uppercase;
          color: var(--af-cyan-mid); font-weight: 600; }
  .hex { font-family: var(--af-font-mono); font-size: 11px; color: var(--af-text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#ffaa00"><span class="wn">W1</span></div><div class="meta"><div class="name">Dawn Sector</div><div class="hex">#FFAA00</div></div></div>
    <div class="sw"><div class="chip" style="background:#00aaff"><span class="wn">W2</span></div><div class="meta"><div class="name">Midday Front</div><div class="hex">#00AAFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#ff5500"><span class="wn">W3</span></div><div class="meta"><div class="name">Dusk Zone</div><div class="hex">#FF5500</div></div></div>
    <div class="sw"><div class="chip" style="background:#9933ff"><span class="wn" style="color:#fff">W4</span></div><div class="meta"><div class="name">Night Ops</div><div class="hex">#9933FF</div></div></div>
  </div>
</body>
</html>

<!-- @dsCard group="Components" viewport="700x520" name="Controls" subtitle="Buttons · icon buttons · toggles · segmented · badges" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0">
<style>
  body { margin: 0; background: var(--af-bg); font-family: var(--af-font-ui); padding: 26px; color: var(--af-text); }
  .sec { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--af-text-muted); margin: 0 0 12px; font-weight: 700; }
  .group { margin-bottom: 26px; }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, IconButton, Toggle, SegmentedControl, Badge } = window.AeroFighterDesignSystem_9520d9;
    function Demo() {
      const [sfx, setSfx] = React.useState(true);
      const [diff, setDiff] = React.useState(1);
      return (
        <div>
          <div className="group">
            <p className="sec">Buttons</p>
            <div className="row">
              <Button variant="primary" size="lg" icon="rocket_launch">Scramble</Button>
              <Button variant="secondary" icon="flight">Hangar</Button>
              <Button variant="danger">Abort</Button>
              <Button variant="success" icon="check_circle">Confirm</Button>
              <Button disabled>Equipped</Button>
            </div>
          </div>
          <div className="group">
            <p className="sec">Icon Buttons</p>
            <div className="row">
              <IconButton icon="pause" />
              <IconButton icon="wifi" />
              <IconButton icon="volume_up" />
              <IconButton icon="home" active shape="rounded" />
            </div>
          </div>
          <div className="group">
            <p className="sec">Toggle · Segmented</p>
            <div className="row">
              <Toggle checked={sfx} onChange={setSfx} />
              <div style={{ width: 280 }}>
                <SegmentedControl value={diff} onChange={setDiff} options={[
                  { label: 'Easy', color: 'var(--af-success)' },
                  { label: 'Normal', color: 'var(--af-blue)' },
                  { label: 'Hard', color: 'var(--af-danger)' },
                ]} />
              </div>
            </div>
          </div>
          <div className="group" style={{ marginBottom: 0 }}>
            <p className="sec">Badges</p>
            <div className="row">
              <Badge color="var(--af-success)">Equipped</Badge>
              <Badge variant="outline" color="var(--af-cyan)">Ready</Badge>
              <Badge color="var(--af-warning)">Max Lives</Badge>
              <Badge dot color="var(--af-amber)" />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
